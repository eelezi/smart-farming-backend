server:
  port: 8080

spring:
  docker:
    compose:
      enabled: ${DOCKER_COMPOSE_ENABLED:false}
      file: docker-compose.yml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smart_farming}
    username: ${DB_USERNAME:smart_user}
    password: ${DB_PASSWORD:smart_pass}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  ai:
    google:
      genai:
        api-key: ${GOOGLE_GENAI_API_KEY:}
        chat:
          options:
            model: "gemini-3-flash-preview"

app:
  ai:
    diagnosis-system-prompt: >-
      You are an expert plant pathologist and botanist. Analyze the provided plant image,
      detect whether disease is present, and respond strictly with the requested JSON schema.
    recommendation-system-prompt: >-
      You are an expert in agriculture and an irrigation specialist. Based on the provided
      planting information and weather forecast data, provide a comprehensive plan for how to water the crops,
      general tips regarding the expected temperature, and how to react to expected rain or temperature changes.
      If the weather forecast data is missing, then provide a general recommendation for the specified crop.
      The default temperature measurement unit is Celsius. 
      The output must strictly conform to the provided JSON schema.

management:
  endpoints:
    web:
      exposure:
        include: health,info
