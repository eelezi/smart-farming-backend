server:
  port: 8080

spring:
  docker:
    compose:
      enabled: ${DOCKER_COMPOSE_ENABLED:false}
      file: docker-compose.yml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/smart_farming}
    username: ${DB_USERNAME:smart_user}
    password: ${DB_PASSWORD:smart_pass}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
